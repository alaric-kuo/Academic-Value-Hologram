name: AVH Semantic Timestamp Pipeline

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.tex'
      - 'avh_manifest.json'
      - '!AVH_OBSERVATION_LOG.md'
      - '!WP_Ready_*.html'
      - '!*_Archive.tex'

permissions:
  contents: write

jobs:
  run-hologram-and-archive:
    runs-on: ubuntu-latest

    steps:
      - name: 🛰️ 載入宇宙網格
        uses: actions/checkout@v4

      - name: 🐍 部署算力引擎
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安裝開源神經網路 (免 API Key)
        run: |
          pip install --upgrade pip
          pip install sentence-transformers requests numpy

      - name: 🔮 啟動 AVH 引擎理論收斂 (免費流)
        env:
          # 只保留 Semantic Scholar (非必填，空白亦可免費運行)
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: python avh_core.py

      - name: 🚩 資訊熵同步 (Commit 觀測日誌)
        run: |
          git config --local user.email "avh-bot@aj-consulting.net"
          git config --local user.name "AVH Hologram Oracle"
          git add AVH_OBSERVATION_LOG.md
          git commit -m "📡 AVH 軌跡刻印：零金鑰拓樸觀測完成 [skip ci]" || echo "無相變發生"
          git push

      - name: ⏳ 刻印語意時間戳與多維資產 (Create Semantic Release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$HEX_CODE" ]; then
            TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
            TAG_NAME="AVH-State-${HEX_CODE}-${TIMESTAMP}"
            
            gh release create "$TAG_NAME" AVH_OBSERVATION_LOG.md *_Archive.tex WP_Ready_*.html \
              -t "狀態矩陣更新 - 演化時間戳 $TIMESTAMP" \
              -n "知識本體已完成收斂。此版本為【零金鑰開源實踐】。\n包含：1. 實作軌跡日誌 2. HTML 實體 3. LaTeX 原始碼"
          fi
