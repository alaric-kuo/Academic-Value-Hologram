name: AVH Hologram Engine (V27.0)

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
  workflow_dispatch: 

jobs:
  avh-manifestation:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write   
      models: read      

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Ultra-Light Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai requests zhconv

      - name: 🚀 Run AVH Genesis Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python avh_core.py

      - name: 💾 Commit and Push Artifacts
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          [ -f AVH_OBSERVATION_LOG.md ] && git add AVH_OBSERVATION_LOG.md || true
          compgen -G "WP_Ready_*.html" > /dev/null && git add WP_Ready_*.html || true
          compgen -G "*_Archive.tex" > /dev/null && git add *_Archive.tex || true

          git diff --cached --quiet || (git commit -m "🌌 系統自動顯化：V27.0 全域聯集能勢場探測" && git push)
