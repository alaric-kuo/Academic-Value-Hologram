name: AVH Hologram Engine (V24.1)

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - '*.py'
      - '.github/workflows/*.yml'
  workflow_dispatch: 

jobs:
  avh-manifestation:
    # 🛑 【防禦死循環】：拒絕機器人觸發，只有人類推的 Code 才會跑！
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write   
      models: read      

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy networkx scikit-learn sentence-transformers openai requests zhconv

      - name: 🚀 Run AVH Genesis Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python avh_core.py

      - name: 💾 Commit and Push Artifacts (實相刻印)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 【防止檔案消失】：安全地檢查檔案是否存在，存在才加入追蹤，不存在也不會報錯中斷
          [ -f AVH_OBSERVATION_LOG.md ] && git add AVH_OBSERVATION_LOG.md || true
          compgen -G "WP_Ready_*.html" > /dev/null && git add WP_Ready_*.html || true
          compgen -G "*_Archive.tex" > /dev/null && git add *_Archive.tex || true

          # 檢查快取是否有變動，有的話才執行 commit 與 push
          git diff --cached --quiet || (git commit -m "🌌 系統自動顯化：arXiv 實體聯網與 GitHub Models 觀測結果" && git push)
